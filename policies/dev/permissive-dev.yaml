# ============================================================================
# TNG NemoClaw — Development / Testing Policy
# Broad access with logging — for experimentation, NOT production
# https://thenewguard.ai
# ============================================================================
#
# WARNING: This policy is intentionally permissive. Do NOT use in production.
# It exists so you can test agent capabilities without fighting the sandbox.
# When you're done testing, switch to a restrictive policy.
#
# TO APPLY:
#   openshell policy apply --network policies/dev/permissive-dev.yaml
# ============================================================================

version: "1.0"
name: "tng-dev-permissive"
description: "Development/testing — broad access with full logging"

network:
  egress:
    allow:
      # Open access to common dev APIs
      - host: "*.github.com"
        ports: [443]
        protocol: "https"

      - host: "*.githubusercontent.com"
        ports: [443]
        protocol: "https"

      - host: "*.npmjs.org"
        ports: [443]
        protocol: "https"

      - host: "*.pypi.org"
        ports: [443]
        protocol: "https"

      - host: "integrate.api.nvidia.com"
        ports: [443]
        protocol: "https"

      - host: "api.openai.com"
        ports: [443]
        protocol: "https"

      - host: "api.anthropic.com"
        ports: [443]
        protocol: "https"

      # General HTTPS — for testing. Remove in production.
      - host: "*"
        ports: [443]
        protocol: "https"
        description: "BROAD HTTPS — dev only, remove for production"

    deny:
      # Still block non-HTTPS
      - host: "*"
        ports: [80]
        protocol: "http"
        description: "Block plaintext HTTP"

  logging:
    # Log everything — useful for understanding what the agent tries to reach
    blocked_requests: true
    allowed_requests: true
    format: "json"

filesystem:
  writable:
    - "/sandbox"
    - "/tmp"

  blocked:
    - "/etc/shadow"
    - "/etc/passwd"

  logging:
    all_access: true

process:
  deny_privilege_escalation: true
  seccomp_profile: "default"
  deny_new_namespaces: true

inference:
  provider: "nvidia-cloud"
  model: "nvidia/nemotron-3-super-120b-a12b"

  privacy_router:
    enabled: true
    allow_cloud: true
    redact_patterns:
      - "\\b\\d{3}-\\d{2}-\\d{4}\\b"
    log_routing: true
