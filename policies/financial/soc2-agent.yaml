# ============================================================================
# TNG NemoClaw — SOC 2 Financial Services Policy
# For financial deployments requiring audit trails and data controls
# https://thenewguard.ai
# ============================================================================
#
# WHAT THIS DOES:
#   - Allows only financial data provider APIs (customizable)
#   - Full audit logging on every action for SOC 2 evidence
#   - Inference routing with PII/financial data redaction
#   - Strict filesystem boundaries with tamper-evident logging
#   - Supports both cloud and local inference with privacy controls
#
# TO APPLY:
#   openshell policy apply --network policies/financial/soc2-agent.yaml
# ============================================================================

version: "1.0"
name: "tng-soc2-financial"
description: "SOC 2 compliant agent policy — audit trails, financial data controls"

network:
  egress:
    allow:
      # ----------------------------------------------------------------
      # CUSTOMIZE: Replace with your financial data endpoints
      # ----------------------------------------------------------------
      - host: "api.bloomberg.com"
        ports: [443]
        protocol: "https"
        description: "Bloomberg data API"

      - host: "api.refinitiv.com"
        ports: [443]
        protocol: "https"
        description: "Refinitiv data API"

      - host: "your-internal-api.company.com"
        ports: [443]
        protocol: "https"
        description: "Internal financial systems (REPLACE)"

      # Inference — cloud allowed with privacy controls
      - host: "integrate.api.nvidia.com"
        ports: [443]
        protocol: "https"
        description: "NVIDIA Cloud inference (with privacy router)"

    deny:
      - host: "*"
        description: "Deny all non-allowlisted traffic"

  logging:
    blocked_requests: true
    allowed_requests: true
    format: "json"
    # Include request metadata for SOC 2 evidence
    include_timestamp: true
    include_source_sandbox: true
    include_destination: true

filesystem:
  writable:
    - "/sandbox/workspace"
    - "/sandbox/output"
    - "/sandbox/audit-trail"
    - "/tmp"

  blocked:
    - "/etc"
    - "/var"
    - "/home"

  logging:
    # Tamper-evident: log every file operation with hash
    all_access: true
    include_file_hash: true
    format: "json"

process:
  deny_privilege_escalation: true
  seccomp_profile: "strict"
  deny_new_namespaces: true

inference:
  provider: "nvidia-cloud"
  model: "nvidia/nemotron-3-super-120b-a12b"

  fallback:
    provider: "nim-local"
    model: "nvidia/nemotron-3-super-120b-a12b"

  privacy_router:
    enabled: true
    allow_cloud: true

    redact_patterns:
      # Account numbers
      - "\\b\\d{8,12}\\b"
      # SSN
      - "\\b\\d{3}-\\d{2}-\\d{4}\\b"
      # Credit card patterns
      - "\\b\\d{4}[- ]?\\d{4}[- ]?\\d{4}[- ]?\\d{4}\\b"
      # Routing numbers
      - "\\b0[0-9]{8}\\b"
      # Email
      - "\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Z|a-z]{2,}\\b"

    log_routing: true
    log_redactions: true
